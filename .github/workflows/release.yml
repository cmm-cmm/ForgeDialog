name: Release

concurrency:
  group: release-main
  cancel-in-progress: false

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run validate:all
      - run: npm sbom --sbom-format cyclonedx > forgedialog-sbom.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: forgedialog-sbom
          path: forgedialog-sbom.json
      - name: Publish to npm with OIDC
        if: vars.NPM_PUBLISH_ENABLED == 'true'
        run: npm publish --access public
      - name: Skip npm publishing until trusted publishing is enabled
        if: vars.NPM_PUBLISH_ENABLED != 'true'
        run: echo "Set the NPM_PUBLISH_ENABLED repository variable after configuring npm trusted publishing."
