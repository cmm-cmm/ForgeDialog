<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ForgeDialog Demo</title>
    <link rel="stylesheet" href="../dist/index.css" />
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        padding: 40px 24px 80px;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        max-width: 720px;
        margin-inline: auto;
        color: #1a1d23;
        background: #f7f8fa;
      }
      @media (prefers-color-scheme: dark) {
        body {
          color: #f2f3f5;
          background: #14161b;
        }
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 4px;
      }
      p.lead {
        color: #5b6270;
        margin-top: 0;
      }
      .demo-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 12px;
        margin: 24px 0;
      }
      .demo-btn {
        padding: 12px 16px;
        border-radius: 8px;
        border: 1px solid #d6d9e0;
        background: white;
        cursor: pointer;
        font-size: 0.95rem;
      }
      .demo-btn:hover {
        background: #eceef2;
      }
      @media (prefers-color-scheme: dark) {
        .demo-btn {
          background: #1f2229;
          border-color: #33363f;
          color: #f2f3f5;
        }
        .demo-btn:hover {
          background: #2b2e37;
        }
      }
      .theme-row {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 24px;
      }
      #log {
        background: #11131a;
        color: #d7f9d0;
        padding: 16px;
        border-radius: 8px;
        min-height: 120px;
        max-height: 320px;
        overflow-y: auto;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 0.85rem;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>ForgeDialog Demo</h1>
    <p class="lead">Manual verification page for alert / confirm / prompt / open() and stacking.</p>

    <div class="theme-row">
      <strong>Theme:</strong>
      <button class="demo-btn" data-theme="light">Light</button>
      <button class="demo-btn" data-theme="dark">Dark</button>
      <button class="demo-btn" data-theme="system">System</button>
    </div>

    <div class="demo-grid">
      <button class="demo-btn" id="btn-alert">Show Alert</button>
      <button class="demo-btn" id="btn-confirm">Show Confirm</button>
      <button class="demo-btn" id="btn-prompt">Show Prompt</button>
      <button class="demo-btn" id="btn-prompt-validate">Prompt with validation</button>
      <button class="demo-btn" id="btn-custom">Custom open()</button>
      <button class="demo-btn" id="btn-stacked">Two Stacked Dialogs</button>
      <button class="demo-btn" id="btn-no-animation">Alert (no animation)</button>
      <button class="demo-btn" id="btn-slide">Confirm (slide animation)</button>
    </div>

    <strong>Result log</strong>
    <pre id="log"></pre>

    <script src="../dist/index.global.js"></script>
    <script>
      const { alert, confirm, prompt, open, setTheme, registerPlugin } = ForgeDialog;
      const log = document.getElementById('log');

      function print(label, value) {
        const line = `[${new Date().toLocaleTimeString()}] ${label}: ${JSON.stringify(value)}\n`;
        log.textContent = line + log.textContent;
      }

      registerPlugin({
        name: 'demo-logger',
        hooks: {
          afterOpen: (ctx) => print('hook:afterOpen', ctx.instance.id),
          afterClose: (ctx) => print('hook:afterClose', ctx.instance.id),
        },
      });

      document.querySelectorAll('[data-theme]').forEach((btn) => {
        btn.addEventListener('click', () => setTheme(btn.dataset.theme));
      });

      document.getElementById('btn-alert').addEventListener('click', async () => {
        await alert('This is an alert dialog.', { title: 'Heads up' });
        print('alert()', 'closed');
      });

      document.getElementById('btn-confirm').addEventListener('click', async () => {
        const result = await confirm('Are you sure you want to continue?', {
          title: 'Please confirm',
        });
        print('confirm()', result);
      });

      document.getElementById('btn-prompt').addEventListener('click', async () => {
        const result = await prompt('What is your name?', {
          title: 'Introduce yourself',
          defaultValue: 'Ada Lovelace',
        });
        print('prompt()', result);
      });

      document.getElementById('btn-prompt-validate').addEventListener('click', async () => {
        const result = await prompt('Enter an even number:', {
          title: 'Validated prompt',
          validate: (value) => {
            const n = Number(value);
            if (Number.isNaN(n)) return 'Please enter a number';
            if (n % 2 !== 0) return 'Number must be even';
            return true;
          },
        });
        print('prompt() validated', result);
      });

      document.getElementById('btn-custom').addEventListener('click', () => {
        const instance = open({
          title: 'Custom dialog',
          content: (container) => {
            const p = document.createElement('p');
            p.textContent = 'This dialog was built with the generic open() API.';
            container.appendChild(p);
          },
          buttons: [
            { text: 'Close', role: 'primary', autoFocus: true, onClick: (i) => i.close('done') },
          ],
        });
        instance.whenClosed().then((result) => print('open()', result));
      });

      document.getElementById('btn-stacked').addEventListener('click', async () => {
        const first = confirm('First dialog. Open a second one on top?', { title: 'Dialog 1' });
        const second = await confirm('This is stacked above the first dialog.', {
          title: 'Dialog 2',
        });
        print('stacked: second result', second);
        const firstResult = await first;
        print('stacked: first result', firstResult);
      });

      document.getElementById('btn-no-animation').addEventListener('click', async () => {
        await alert('This alert opens/closes instantly.', { animation: 'none' });
        print('alert() no animation', 'closed');
      });

      document.getElementById('btn-slide').addEventListener('click', async () => {
        const result = await confirm('This dialog slides in from below.', { animation: 'slide' });
        print('confirm() slide', result);
      });
    </script>
  </body>
</html>
